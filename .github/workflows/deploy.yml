name: 🚀 Build & Deploy to cPanel

on:
  push:
    branches:
      - main  # Trigger workflow ketika push ke branch main

jobs:
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ---- BUILD FRONTEND ----
      - name: 🔨 Install & Build Frontend
        env:
          NITRO_PRESET: node-server
          VITE_API_URL: https://filkommerch.com
        run: |
          cd frontend
          npm ci
          npm run build

      # ---- CREATE RESTART TRIGGER ----
      - name: ⏱️ Create Restart File
        run: |
          mkdir -p frontend/tmp
          echo $(date) > frontend/tmp/restart.txt

      # ---- DEPLOY TO CPANEL VIA FTP ----
      - name: 📂 Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/
          server-dir: /frontend_app/
          exclude: |
            **/node_modules/**
            **/.git/**
            **/src/**
            **/.env*
            **/tsconfig.json
            **/vite.config.ts
            **/eslint.config.js

  deploy-backend:
    name: ⚙️ Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ---- BUILD BACKEND ----
      - name: 🔨 Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      # ---- CREATE RESTART TRIGGER ----
      - name: ⏱️ Create Restart File
        run: |
          mkdir -p backend/tmp
          echo $(date) > backend/tmp/restart.txt

      # ---- DEPLOY TO CPANEL VIA FTP ----
      - name: 📂 Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /backend_app/
          exclude: |
            **/node_modules/**
            **/.git/**
            **/src/**
            **/.env*
            **/tsconfig.json
